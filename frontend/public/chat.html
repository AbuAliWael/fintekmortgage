<!doctype html>
<!--
  Fintek Mortgage — AI Chatbot Widget (NJ Non-QM specialist)
  Embed snippet for any fintekmortgage.com page:
    <script src="https://fintekmortgage.com/widget.js" defer></script>
  Or include this entire file as a standalone /chat page.

  Backend: /api/chat (Vercel serverless function — see api/chat.js)
  Compliance: NJ-licensed only · NMLS #2171794 disclosed in every conversation
  Target: capture contact + book Calendly slot for self-employed Non-QM borrowers
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fintek Mortgage — Self-Employed Mortgage Advisor</title>
  <style>
    :root {
      --navy:    #0A1628;
      --gold:    #B8862C;
      --bg:      #FFFFFF;
      --text:    #1A1A1A;
      --muted:   #6B6B6B;
      --border:  #E5E5E5;
      --user-bg: #F4F1E8;
      --bot-bg:  #F7F7F5;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
    .chat-wrap { max-width: 720px; margin: 0 auto; padding: 16px; min-height: 100vh; display: flex; flex-direction: column; }
    .chat-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
    .chat-header .logo { font-weight: 700; font-size: 16px; color: var(--navy); }
    .chat-header .tag { font-size: 11px; color: var(--muted); }
    .chat-messages { flex: 1; overflow-y: auto; padding: 16px 0; }
    .msg { padding: 10px 14px; border-radius: 12px; margin-bottom: 10px; font-size: 14.5px; line-height: 1.55; max-width: 85%; }
    .msg.bot  { background: var(--bot-bg); margin-right: auto; border-left: 3px solid var(--gold); }
    .msg.user { background: var(--user-bg); margin-left: auto; }
    .msg .speaker { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 4px; }
    .msg.bot .speaker { color: #B8862C; }
    .quick-replies { display: flex; flex-wrap: wrap; gap: 6px; padding: 4px 0 12px; }
    .quick-replies button { font-size: 12.5px; padding: 6px 12px; border: 1px solid var(--border); background: #fff; border-radius: 999px; cursor: pointer; color: var(--navy); }
    .quick-replies button:hover { border-color: var(--gold); }
    .composer { display: flex; gap: 8px; padding: 12px 0 4px; border-top: 1px solid var(--border); }
    .composer textarea { flex: 1; resize: none; min-height: 44px; max-height: 120px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; font-family: inherit; }
    .composer button { padding: 0 18px; border: none; background: var(--navy); color: #fff; border-radius: 10px; font-weight: 600; cursor: pointer; }
    .composer button:disabled { opacity: 0.4; cursor: not-allowed; }
    .footer { padding: 10px 0; font-size: 10.5px; color: var(--muted); text-align: center; border-top: 1px solid var(--border); margin-top: 6px; }
    .typing { color: var(--muted); font-style: italic; font-size: 13px; padding: 8px 14px; }
    @media (max-width: 480px) { .msg { max-width: 92%; } }
  </style>
</head>
<body>
  <div class="chat-wrap">
    <div class="chat-header">
      <div>
        <div class="logo">Fintek Mortgage · Self-Employed Mortgage AI</div>
        <div class="tag">Non-QM · Bank Statement · DSCR · 1099 · ITIN — NJ-licensed</div>
      </div>
    </div>

    <div class="chat-messages" id="chat-messages"></div>
    <div class="quick-replies" id="quick-replies"></div>
    <div class="composer">
      <textarea id="composer-input" placeholder="Ask about Bank Statement, DSCR, 1099, ITIN, or P&L Only loans..." rows="1"></textarea>
      <button id="composer-send">Send</button>
    </div>
    <div class="footer">
      Wael Abdeldayem · NMLS #2171794 · Licensed in New Jersey · Equal Housing Lender · This is an educational tool. Indicative answers only — final approval requires full underwriting.
    </div>
  </div>

  <script>
  (function(){
    const messagesEl = document.getElementById('chat-messages');
    const quickEl    = document.getElementById('quick-replies');
    const inputEl    = document.getElementById('composer-input');
    const sendBtn    = document.getElementById('composer-send');

    // Persisted across page reloads — single user session
    const SESSION_KEY = 'fintek_chat_session';
    let history = JSON.parse(sessionStorage.getItem(SESSION_KEY) || '[]');
    let captured = JSON.parse(sessionStorage.getItem(SESSION_KEY + '_lead') || '{}');

    function render(){
      messagesEl.innerHTML = history.map(m => `
        <div class="msg ${m.role === 'assistant' ? 'bot' : 'user'}">
          <div class="speaker">${m.role === 'assistant' ? 'Fintek AI' : 'You'}</div>
          <div>${escapeHtml(m.content).replace(/\n/g, '<br>')}</div>
        </div>
      `).join('');
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function escapeHtml(s){
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function setQuickReplies(items){
      quickEl.innerHTML = (items || []).map(t =>
        `<button data-text="${escapeHtml(t)}">${escapeHtml(t)}</button>`
      ).join('');
      quickEl.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          inputEl.value = btn.dataset.text;
          send();
        });
      });
    }

    async function send(){
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = '';
      sendBtn.disabled = true;

      history.push({ role: 'user', content: text });
      render();

      const typing = document.createElement('div');
      typing.className = 'typing';
      typing.textContent = 'Fintek AI is typing...';
      messagesEl.appendChild(typing);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ history, captured })
        });
        const data = await res.json();
        typing.remove();

        if (data.assistant) {
          history.push({ role: 'assistant', content: data.assistant });
        }
        if (data.captured) {
          captured = { ...captured, ...data.captured };
          sessionStorage.setItem(SESSION_KEY + '_lead', JSON.stringify(captured));
        }
        if (data.quick_replies) setQuickReplies(data.quick_replies);

        sessionStorage.setItem(SESSION_KEY, JSON.stringify(history));
        render();
      } catch (err) {
        typing.remove();
        history.push({ role: 'assistant',
          content: "I'm having a connection hiccup. Please try again, or book a call directly: https://calendly.com/abualiwael/30min"
        });
        render();
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener('click', send);
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    // First-load greeting if empty
    if (history.length === 0) {
      history.push({
        role: 'assistant',
        content:
          "Hi — I'm Fintek's AI assistant. I help self-employed buyers, 1099 contractors, and real-estate investors in New Jersey understand which mortgage program fits their situation.\n\nWhat brought you here today?"
      });
      setQuickReplies([
        "I'm self-employed — can I qualify for a mortgage?",
        "What's a Bank Statement loan?",
        "I want a DSCR loan for an investment property",
        "I'm a 1099 contractor",
        "Just exploring rates",
      ]);
      sessionStorage.setItem(SESSION_KEY, JSON.stringify(history));
    } else {
      setQuickReplies([]);
    }
    render();
  })();
  </script>
</body>
</html>
