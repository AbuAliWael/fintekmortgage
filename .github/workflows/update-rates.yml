name: Update Mortgage Rates

on:
  schedule:
    - cron: '0 14 * * 5'   # Every Friday at 2pm UTC (10am ET) — after Freddie Mac publishes
  workflow_dispatch:         # Allow manual trigger

jobs:
  update-rates:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Freddie Mac PMMS rates
        id: fetch-rates
        run: |
          python3 << 'EOF'
          import urllib.request
          import json
          import re
          from datetime import datetime, timezone

          # Freddie Mac PMMS — fetch via FRED (St. Louis Fed) using public DEMO_KEY
          # MORTGAGE30US = 30-year fixed, MORTGAGE15US = 15-year fixed
          # DEMO_KEY allows 1000 requests/day — more than enough for weekly runs

          def fetch_fred(series_id):
              url = (
                  f"https://api.stlouisfed.org/fred/series/observations"
                  f"?series_id={series_id}"
                  f"&api_key=DEMO_KEY"
                  f"&limit=1&sort_order=desc&file_type=json"
              )
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'fintekmortgage-ratebot/1.0'})
                  with urllib.request.urlopen(req, timeout=15) as r:
                      data = json.loads(r.read())
                      obs = data.get('observations', [])
                      if obs and obs[0].get('value') not in ('.', '', None):
                          return float(obs[0]['value']), obs[0]['date']
              except Exception as e:
                  print(f"FRED error for {series_id}: {e}")
              return None, None

          rate_30, date_30 = fetch_fred('MORTGAGE30US')
          rate_15, date_15 = fetch_fred('MORTGAGE15US')

          # Fallback to last known rates if fetch fails
          try:
              with open('frontend/public/rates.json') as f:
                  existing = json.load(f)
          except Exception:
              existing = {'rates': {'30yr_fixed': 6.81, '15yr_fixed': 6.10}}

          rates = {
              '30yr_fixed': rate_30 if rate_30 else existing['rates']['30yr_fixed'],
              '15yr_fixed': rate_15 if rate_15 else existing['rates']['15yr_fixed'],
          }

          updated = date_30 if date_30 else datetime.now(timezone.utc).strftime('%Y-%m-%d')

          output = {
              'updated': updated,
              'source': 'Freddie Mac Primary Mortgage Market Survey (PMMS) via FRED',
              'rates': rates
          }

          with open('frontend/public/rates.json', 'w') as f:
              json.dump(output, f, indent=2)

          print(f"Rates updated: 30yr={rates['30yr_fixed']}%, 15yr={rates['15yr_fixed']}%, as of {updated}")
          EOF

      - name: Commit updated rates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/rates.json
          if git diff --staged --quiet; then
            echo "No rate changes this week"
          else
            git commit -m "chore: update mortgage rates from Freddie Mac PMMS"
            git push
          fi
