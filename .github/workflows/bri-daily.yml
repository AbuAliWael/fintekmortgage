name: Bri Daily Intel Run

on:
  schedule:
      - cron: '0 12 * * 1-5'
        workflow_dispatch:

        jobs:
          bri-run:
              runs-on: ubuntu-latest
                  timeout-minutes: 15

                      steps:
                            - name: Checkout repo
                                    uses: actions/checkout@v4

                                          - name: Set up Python
                                                  uses: actions/setup-python@v5
                                                          with:
                                                                    python-version: '3.11'

                                                                          - name: Install dependencies
                                                                                  run: |
                                                                                            pip install anthropic requests

                                                                                                  - name: Run Bri via Claude API
                                                                                                          env:
                                                                                                                    ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
                                                                                                                            run: |
                                                                                                                                      python3 - <<'EOF'
                                                                                                                                                import anthropic
                                                                                                                                                          import json
                                                                                                                                                                    import os
                                                                                                                                                                              from datetime import datetime
                                                                                                                                                                                        from zoneinfo import ZoneInfo
                                                                                                                                                                                        
                                                                                                                                                                                                  et = ZoneInfo("America/New_York")
                                                                                                                                                                                                            now = datetime.now(et)
                                                                                                                                                                                                                      today = now.strftime("%Y-%m-%d")
                                                                                                                                                                                                                                weekday = now.weekday()
                                                                                                                                                                                                                                
                                                                                                                                                                                                                                          COUNTY_MAP   = {0:"Bergen", 1:"Essex", 2:"Middlesex", 3:"Monmouth", 4:"Morris"}
                                                                                                                                                                                                                                                    INDUSTRY_MAP = {0:"Healthcare", 1:"Engineering", 2:"Financial Services", 3:"Legal", 4:"Technology"}
                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                              county   = COUNTY_MAP.get(weekday, "Bergen")
                                                                                                                                                                                                                                                                        industry = INDUSTRY_MAP.get(weekday, "Healthcare")
                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                  PROMPT = f"""You are Bri, Intel & Research agent for the Apex Growth System.
                                                                                                                                                                                                                                                                                            Client: Wael Abd El Dayem | Fintek Mortgage | NMLS #2171794 | NJ LICENSED ONLY.
                                                                                                                                                                                                                                                                                                      Date: {today} | County: {county} | Industry: {industry}
                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                STEP 1 - Market Intel: Report NJ HELOC permit leads, FRED 30yr rate, NJ HPI, court tasks queued.
                                                                                                                                                                                                                                                                                                                          STEP 2 - Accountant List: Find 5-10 new NJ CPA firms in {county} County. Output JSON array key accountants.
                                                                                                                                                                                                                                                                                                                                    STEP 3 - Employer List: Find 5-10 new NJ {industry} companies with HR contacts. Output JSON array key employers.
                                                                                                                                                                                                                                                                                                                                              STEP 4 - Report in this format:
                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                        BRI DAILY RUN - {today}
                                                                                                                                                                                                                                                                                                                                                                  CORE INTEL
                                                                                                                                                                                                                                                                                                                                                                            - Permits pulled: [N] HELOC candidates
                                                                                                                                                                                                                                                                                                                                                                                      - 30yr rate: [rate]
                                                                                                                                                                                                                                                                                                                                                                                                - NJ HPI: [value]
                                                                                                                                                                                                                                                                                                                                                                                                          - Court tasks queued: [N]
                                                                                                                                                                                                                                                                                                                                                                                                                    LIST BUILDING
                                                                                                                                                                                                                                                                                                                                                                                                                              - Accountants: +[N] new firms
                                                                                                                                                                                                                                                                                                                                                                                                                                        - NJ Employers: +[N] new companies
                                                                                                                                                                                                                                                                                                                                                                                                                                                  FLAGS: [any errors]
                                                                                                                                                                                                                                                                                                                                                                                                                                                            STATUS: Clean / Partial / Failed"""
                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                      client = anthropic.Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                response = client.messages.create(
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              model="claude-haiku-4-5-20251001",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            max_tokens=2048,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          tools=[{"type": "web_search_20250305", "name": "web_search"}],
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        messages=[{"role": "user", "content": PROMPT}]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  )
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            output = "\n".join(b.text for b in response.content if hasattr(b, "text"))
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      print(output)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                os.makedirs("logs", exist_ok=True)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          with open(f"logs/bri_{today}.json", "w") as f:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        json.dump({"date": today, "county": county, "industry": industry, "output": output,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 "input_tokens": response.usage.input_tokens, "output_tokens": response.usage.output_tokens}, f, indent=2)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           print(f"Tokens: {response.usage.input_tokens} in / {response.usage.output_tokens} out")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     EOF
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           - name: Upload Bri log
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     name: bri-log-${{ github.run_id }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               path: logs/
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         retention-days: 30
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         
