name: Kate Daily Briefing

on:
  schedule:
      - cron: '45 11 * * 1-5'
        workflow_dispatch:

        jobs:
          kate-brief:
              runs-on: ubuntu-latest
                  timeout-minutes: 10

                      steps:
                            - name: Checkout repo
                                    uses: actions/checkout@v4

                                          - name: Set up Python
                                                  uses: actions/setup-python@v5
                                                          with:
                                                                    python-version: '3.11'

                                                                          - name: Install dependencies
                                                                                  run: pip install anthropic requests

                                                                                        - name: Generate Kate Daily Brief
                                                                                                env:
                                                                                                          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
                                                                                                                    RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
                                                                                                                            run: |
                                                                                                                                      python3 - <<'EOF'
                                                                                                                                                import anthropic, requests, json, os
                                                                                                                                                          from datetime import datetime
                                                                                                                                                                    from zoneinfo import ZoneInfo
                                                                                                                                                                    
                                                                                                                                                                              et = ZoneInfo("America/New_York")
                                                                                                                                                                                        now = datetime.now(et)
                                                                                                                                                                                                  today = now.strftime("%A, %B %d, %Y")
                                                                                                                                                                                                            weekday = now.weekday()
                                                                                                                                                                                                            
                                                                                                                                                                                                                      COUNTY_MAP   = {0:"Bergen",1:"Essex",2:"Middlesex",3:"Monmouth",4:"Morris"}
                                                                                                                                                                                                                                INDUSTRY_MAP = {0:"Healthcare",1:"Engineering",2:"Financial Services",3:"Legal",4:"Technology"}
                                                                                                                                                                                                                                          county   = COUNTY_MAP.get(weekday,"Bergen")
                                                                                                                                                                                                                                                    industry = INDUSTRY_MAP.get(weekday,"Healthcare")
                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                              bri_context = f"County: {county} | Industry: {industry}"
                                                                                                                                                                                                                                                                        log_path = f"logs/bri_{now.strftime('%Y-%m-%d')}.json"
                                                                                                                                                                                                                                                                                  if os.path.exists(log_path):
                                                                                                                                                                                                                                                                                                with open(log_path) as f:
                                                                                                                                                                                                                                                                                                                  bri_data = json.load(f)
                                                                                                                                                                                                                                                                                                                                bri_context = bri_data.get("output", bri_context)[:800]
                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                          PROMPT = f"""You are KATE - Commander of the Apex Growth System for Fintek Mortgage.
                                                                                                                                                                                                                                                                                                                                                    Generate today's 6:45am daily briefing for Wael Abd El Dayem (NMLS #2171794).
                                                                                                                                                                                                                                                                                                                                                              Date: {today} | County: {county} | Industry: {industry}
                                                                                                                                                                                                                                                                                                                                                                        Bri intel: {bri_context}
                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                  Format EXACTLY:
                                                                                                                                                                                                                                                                                                                                                                                            APEX DAILY BRIEF - {today}
                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                      TOP LEADS TO CALL TODAY
                                                                                                                                                                                                                                                                                                                                                                                                                1. [specific lead type + why hot today]
                                                                                                                                                                                                                                                                                                                                                                                                                          2. [specific lead type + why hot today]
                                                                                                                                                                                                                                                                                                                                                                                                                                    3. [specific lead type + why hot today]
                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                              NEW LEADS LAST 24H
                                                                                                                                                                                                                                                                                                                                                                                                                                                        - Court records: [estimate]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - LinkedIn relocators: [estimate]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - Website intent: [estimate]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - County: {county} | Industry: {industry}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                CONTENT TODAY
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          [What Sage produces today per schedule]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    FLAGS
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              [Any blockers or action items for Wael]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        KATE'S CALL
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  [1 sharp strategic sentence]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            Tight and actionable. Wael's time is the scarcest resource."""
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      client = anthropic.Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                response = client.messages.create(
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              model="claude-haiku-4-5-20251001",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            max_tokens=1024,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          messages=[{"role":"user","content":PROMPT}]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    )
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              brief = response.content[0].text
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        print(brief)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  resend_key = os.environ.get("RESEND_API_KEY","")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if resend_key:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          r = requests.post(
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            "https://api.resend.com/emails",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              headers={"Authorization":f"Bearer {resend_key}","Content-Type":"application/json"},
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                json={"from":"Kate <kate@fintekmortgage.com>","to":["AbuAliWael@icloud.com"],
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        "subject":f"APEX BRIEF - {today}","text":brief,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                "html":f"<pre style='font-family:monospace'>{brief}</pre>"}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              )
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            print(f"Email: {r.status_code}")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      os.makedirs("logs",exist_ok=True)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                with open(f"logs/kate_brief_{now.strftime('%Y-%m-%d')}.txt","w") as f:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              f.write(brief)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        EOF
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - name: Upload artifact
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        name: kate-brief-${{ github.run_id }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  path: logs/kate_brief_*.txt
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            retention-days: 30
