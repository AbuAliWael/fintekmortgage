name: Kate Daily Briefing

on:
  schedule:
      - cron: '45 11 * * 1-5'
        workflow_dispatch:

        jobs:
          kate-brief:
              runs-on: ubuntu-latest
                  timeout-minutes: 10
                      steps:
                            - uses: actions/checkout@v4
                                  - uses: actions/setup-python@v5
                                          with:
                                                    python-version: '3.11'
                                                          - run: pip install anthropic requests
                                                                - env:
                                                                          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
                                                                                    RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
                                                                                            run: python agents/kate_runner.py
                                                                                                  - uses: actions/upload-artifact@v4
                                                                                                          with:
                                                                                                                    name: kate-brief-${{ github.run_id }}
                                                                                                                              path: logs/
                                                                                                                                        retention-days: 30
